<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top 10 Ranker</title>
    <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
    <div class="app">
        <section class="panel main">
            <p class="eyebrow">TENNER</p>

            <div class="header-block">
                <h1 id="questionTitle"></h1>
                <p id="questionSubtitle" class="subtitle"></p>
            </div>

            <div id="list" class="list"></div>

            <div class="controls-shell">
                <div class="health-track" aria-hidden="true">
                    <div id="healthBar" class="health-bar"></div>
                </div>

                <div class="controls">
                    <button id="resetBtn" class="button-secondary" type="button">Reset</button>
                    <button id="submitBtn" class="button-primary" type="button">Submit</button>
                    <button id="randomQuestionBtn" class="button-ghost" type="button">New 10</button>
                </div>
            </div>

            <div class="meta-bar-wrap">
                <div class="meta-bar-fill" id="metaBarFill"></div>

                <div class="meta-bar">
                    <div class="meta-stat meta-stat-small">
                        <div class="meta-label">Level</div>
                        <div class="meta-value" id="xpScore">1 (0%)</div>
                    </div>

                    <div class="meta-stat meta-stat-large">
                        <div class="meta-label">Coins</div>
                        <div class="meta-value" id="totalScore">0</div>
                    </div>

                    <div class="meta-stat meta-stat-small">
                        <div class="meta-label">Eliminated</div>
                        <div class="meta-value" id="eliminatedCount">0</div>
                    </div>
                </div>
            </div>

            <div class="utility-bar">
                <a href="./rules.html" class="button-ghost button-link">Rules</a>
            </div>

            <div class="options-block">
                <div class="section-label">Options</div>
                <div class="options-grid">
                    <div class="control-group">
                        <label for="modeSelect">Mode</label>
                        <select id="modeSelect"></select>
                        <p id="modeDescription" class="microcopy"></p>
                    </div>
                </div>
            </div>

            <div class="debug-block">
                <div class="section-label">Debug</div>

                <div class="debug-grid">
                    <div id="poolControlGroup" class="control-group">
                        <label for="poolSelect">Answer pool</label>
                        <select id="poolSelect"></select>
                        <p id="poolCount" class="microcopy"></p>
                    </div>

                    <div id="questionControlGroup" class="control-group">
                        <label for="questionSelect">Question</label>
                        <select id="questionSelect"></select>
                        <p id="questionCount" class="microcopy"></p>
                    </div>
                </div>

                <div id="scoringDetail" class="scoring-detail"></div>
            </div>

            <div id="message" class="message"></div>

            <div id="solutionWrap" class="solution-wrap">
                <h2>Correct order</h2>
                <div id="solution" class="solution"></div>
            </div>
        </section>
    </div>

    <div id="pickerOverlay" class="picker-overlay">
        <div class="picker" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
            <div class="picker-header">
                <div id="pickerTitle" class="picker-title">Choose an answer</div>
                <div id="pickerSubtitle" class="picker-subtitle"></div>
            </div>

            <div class="picker-search">
                <input id="pickerSearch" type="text" placeholder="Search answer pool..." autocomplete="off" />
            </div>

            <div id="pickerOptions" class="picker-options"></div>

            <div class="picker-footer">
                <span id="pickerCount"></span>
                <button id="closePickerBtn" class="button-secondary" type="button">Close</button>
            </div>
        </div>
    </div>

    <script src="./data/answer-pools.js"></script>
    <script src="./data/question-templates.js"></script>
    <script src="./data/questions.js"></script>
    <script src="./data/manual-questions.js"></script>
    <script src="./js/scoring.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
